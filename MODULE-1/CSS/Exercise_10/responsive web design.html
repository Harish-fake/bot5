<!DOCTYPE html>
<html lang="en">
<head>
    <title>Responsive Design</title>
    <style>
        body{
            font-size: 2vw;
        }
        nav{
            display: flex;
            gap: 20px;
        }
        img{
            width: 40vw;
        }
        @media screen and (max-width:768px){
            nav{
                flex-direction: column;
            }
            body{
                font-size: 4vw;
            }
            img{
                width: 80vw;
            }
        }
    </style>
</head>
<body>
<nav>
    <a href="#">Home</a>
    <a href="#">Events</a>
    <a href="#">Contact</a>
</nav>
<img src="event.jpg">
</body>
</html>

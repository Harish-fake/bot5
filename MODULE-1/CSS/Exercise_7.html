<!DOCTYPE html>
<html lang="en">
<head>
    <title>Table Styling</title>
    <style>
        table{
            width: 80%;
            border-collapse: collapse;
            text-align: center;
        }
        th,td{
            border: 1px solid black;
            padding: 10px;
        }
        th{
            background-color: gray;
            color: white;
        }
        tr:nth-child(even){
            background-color: lightgray;
        }
    </style>
</head>
<body>
<table>
<tr>
    <th>Event</th>
    <th>Date</th>
</tr>
<tr>
    <td>Music Fest</td>
    <td>10 June</td>
</tr>
<tr>
    <td>Sports Day</td>
    <td>15 June</td>
</tr>
</table>
</body>
</html>

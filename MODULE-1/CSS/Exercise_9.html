<!DOCTYPE html>
<html lang="en">
<head>
    <title>Multiple Columns</title>
    <style>
        .news{
            column-count: 2;
            column-gap: 30px;
            column-rule: 1px solid gray;
        }
    </style>
</head>
<body>
<h1>Community News</h1>
<div class="news">
    The community event portal helps residents
    participate in events and activities.
    Music festivals, sports events, and cultural
    programs are organized regularly for people.
</div>
</body>
</html>

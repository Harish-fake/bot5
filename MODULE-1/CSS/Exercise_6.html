<!DOCTYPE html>
<html lang="en">
<head>
    <title>Links and Lists</title>
    <style>
        a:link{
            color: blue;
        }
        a:hover{
            color: red;
        }
        a:active{
            color: green;
        }
        a:visited{
            color: purple;
        }
        ul{
            list-style-type: none;
            list-style-position: inside;
        }
        li{
            padding: 10px;
            margin: 5px;
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <a href="#">Home</a>
    <ul>
        <li>Music Event</li>
        <li>Sports Event</li>
        <li>Food Festival</li>
    </ul>
</body>
</html>

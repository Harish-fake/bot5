<!DOCTYPE html>
<html lang="en">
<head>
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div id="welcomeBanner">
    <h1>Welcome User!</h1>
    <p>
        Enjoy our
        <span style="color:red; font-weight:bold;">
            Special Offer
        </span>
    </p>
    <p class="highlight">
        Register today for exciting events!
    </p>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Debugging Example</title>	
    <style>
        h1 {
            color: blue;
        }
    </style>
    <script>
        function testDebug() {
            let a = 10;
            let b = 20;
            console.log("Value of A:", a);
            console.log("Value of B:", b);
            let sum = a + b;
            console.log("Sum:", sum);
            alert("Check Console for Output");
        }
    </script>
</head>
<body>
<center>
<h1>Debugging with Chrome DevTools</h1>
<button onclick="testDebug()">
    Run Script
<center>
</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>jQuery Example</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<button id="registerBtn">
    Register
</button>
<div id="card">
    Event Card
</div>
<script>
    $("#registerBtn").click(function(){
        $("#card").fadeOut();
    });
</script>
</body>
</html>

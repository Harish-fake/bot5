<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fetch API</title>
</head>
<body>
<button onclick="sendData()">
    Send Registration
</button>
<p id="message"></p>
<script>
    function sendData(){
        document.getElementById("message")
        .innerHTML = "Sending...";
        setTimeout(function(){
            fetch("https://jsonplaceholder.typicode.com/posts",{
                method:"POST",
                body: JSON.stringify({
                    name:"Suriya"
                }),
                headers:{
                    "Content-type":"application/json"
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("message")
                .innerHTML = "Registration Successful";
                console.log(data);
            });
        },2000);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Functions</title>
</head>
<body>
<div id="output"></div>
<script>
function addEvent(name){
    return name + " Added";
}
function registerUser(user){
    return user + " Registered";
}
document.getElementById("output").innerHTML =
addEvent("Music Fest") + "<br>" +
registerUser("Suriya");
</script>
</body>
</html>
